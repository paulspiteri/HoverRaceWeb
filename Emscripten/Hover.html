<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>HoverRace</title>
    <script src="https://unpkg.com/nipplejs@0.10.2/dist/nipplejs.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
      div.emscripten { text-align: center; }
      div.emscripten_border {  }
      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten {
        border: 0 none;
        background-color: black;
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .trackselection {
        position: absolute;
        top: 0;
      }

      #joystick-zone {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 150px;
        height: 150px;
        background-color: rgba(0, 0, 255, 0.3);
        border-radius: 50%;
        z-index: 1000;
      }

      #weapon-joystick-zone {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 150px;
        height: 150px;
        background-color: rgba(255, 0, 0, 0.3);
        border-radius: 50%;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
      <progress value="0" max="100" id="progress" hidden=1></progress>  
    </div>
    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    </div>
    <hr/>
    <div class="emscripten trackselection">
      <input type="button" value="ClassicH" onclick="Module.ccall('ChangeToTrack', null, ['string'], ['ClassicH.trk'])" />
      <input type="button" value="Steeplechase" onclick="Module.ccall('ChangeToTrack', null, ['string'], ['Steeplechase.trk'])" />
      <input type="button" value="The Alley2" onclick="Module.ccall('ChangeToTrack', null, ['string'], ['The Alley2.trk'])" />
      <input type="button" value="The River" onclick="Module.ccall('ChangeToTrack', null, ['string'], ['The River.trk'])" />
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <input type="button" value="Fullscreen" onclick="Module.requestFullscreen(false, true)" />
    </div>
    <div id="joystick-zone"></div>
    <div id="weapon-joystick-zone">
      <div style="position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: black; font-size: 12px; pointer-events: none;">↑ Switch</div>
      <div style="position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); color: black; font-size: 12px; pointer-events: none;">↓ Fire</div>
    </div>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      if (outputElement) outputElement.value = ''; // clear browser cache

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener("webglcontextlost", (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      var Module = {
        print(...args) {
          // These replacements are necessary if you render to raw HTML
          //text = text.replace(/&/g, "&amp;");
          //text = text.replace(/</g, "&lt;");
          //text = text.replace(/>/g, "&gt;");
          //text = text.replace('\n', '<br>', 'g');
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
          }
        },
        canvas: canvasElement,
        setStatus(text) {
          Module.setStatus.last ??= { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = () => {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>

    <script type='text/javascript'>
      function initVirtualJoysticks() {
        // Movement joystick (left side) - your existing code
        const joystickZone = document.getElementById('joystick-zone');
        const movementManager = nipplejs.create({
          zone: joystickZone,
          mode: 'static',
          position: { left: '50%', top: '50%' },
          color: 'blue',
          size: 120
        });

        // Weapon joystick (right side) - new joystick
        const weaponJoystickZone = document.getElementById('weapon-joystick-zone');
        const weaponManager = nipplejs.create({
          zone: weaponJoystickZone,
          mode: 'static',
          position: { left: '50%', top: '50%' },
          color: 'red',
          size: 120
        });

        // Movement joystick logic (your existing code)
        let currentMovementKeys = new Set();

        movementManager.on('move', function (evt, data) {
          currentMovementKeys.forEach(key => {
            simulateKeyUp(key);
          });
          currentMovementKeys.clear();

          const angle = data.angle.degree;
          const force = data.force;

          if (force > 0.3) {
            let keys = [];

            if (angle >= 315 || angle < 45) {
              keys.push('ArrowRight');
            }
            if (angle >= 45 && angle < 135) {
              keys.push('ArrowUp');
            }
            if (angle >= 135 && angle < 225) {
              keys.push('ArrowLeft');
            }
            if (angle >= 225 && angle < 315) {
              keys.push('ArrowDown');
            }

            keys.forEach(key => {
              simulateKeyDown(key);
              currentMovementKeys.add(key);
            });
          }
        });

        movementManager.on('end', function () {
          currentMovementKeys.forEach(key => {
            simulateKeyUp(key);
          });
          currentMovementKeys.clear();
        });

        // Weapon joystick logic (new)
        let currentWeaponKeys = new Set();

        weaponManager.on('move', function (evt, data) {
          // Clear previous weapon keys
          currentWeaponKeys.forEach(key => {
            simulateKeyUp(key);
          });
          currentWeaponKeys.clear();

          const angle = data.angle.degree;
          const force = data.force;

          if (force > 0.3) {
            let keys = [];

            // UP = Tab (switch weapon)
            if (angle >= 45 && angle < 135) {
              keys.push('Tab');
            }

            // DOWN = Ctrl (fire weapon)
            if (angle >= 225 && angle < 315) {
              keys.push('ControlLeft');
            }

            keys.forEach(key => {
              simulateKeyDown(key);
              currentWeaponKeys.add(key);
            });
          }
        });

        weaponManager.on('start', function () {
          simulateKeyDown('ShiftLeft');
        });

        weaponManager.on('end', function () {
          simulateKeyUp('ShiftLeft');

          currentWeaponKeys.forEach(key => {
            simulateKeyUp(key);
          });
          currentWeaponKeys.clear();
        });
      }

      function simulateKeyDown(key) {
        const event = new KeyboardEvent('keydown', {
          key: key,
          code: key,
          bubbles: true,
          cancelable: true
        });
        document.getElementById('canvas').dispatchEvent(event);
      }

      function simulateKeyUp(key) {
        const event = new KeyboardEvent('keyup', {
          key: key,
          code: key,
          bubbles: true,
          cancelable: true
        });
        document.getElementById('canvas').dispatchEvent(event);
      }

      window.addEventListener('load', function() {
        initVirtualJoysticks();
      });
    </script>

    {{{ SCRIPT }}}
  </body>
</html>
